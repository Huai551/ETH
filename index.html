<script>
var allTrades = [];
var currentFilter = 'all';

// ── STRATEGY ──────────────────────────────────────────
function detectSignals(candles) {
  var signals = [], TOL = 0.002;
  for (var i = 0; i < candles.length - 6; i++) {
    var c1=candles[i], c2=candles[i+1], c3=candles[i+2];
    // LONG
    if (c1.c<c1.o && c2.c>c2.o && Math.abs(c1.c-c2.o)/c1.o<TOL) {
      var wH=c1.o, wL=Math.min(c1.l,c2.l);
      if (Math.max(c3.o,c3.c)<=wH*1.001 && Math.min(c3.o,c3.c)>=wL*0.999) {
        var bk=-1;
        for (var j=i+3;j<Math.min(i+12,candles.length);j++) { if(candles[j].c>wH){bk=j;break;} }
        if (bk!==-1) {
          var fl=wL,fh=candles[bk].c,rng=fh-fl;
          if (rng>=fl*0.005) {
            var sl=fl,tp=fh+rng*0.618,entry=(sl+tp)/2;
            signals.push({type:'LONG',entry:entry,sl:sl,tp:tp,searchFrom:bk+1});
            i=bk;
          }
        }
      }
    }
    // SHORT
    if (c1.c>c1.o && c2.c<c2.o && Math.abs(c1.c-c2.o)/c1.o<TOL) {
      var wL2=c1.o, wH2=Math.max(c1.h,c2.h);
      if (Math.min(c3.o,c3.c)>=wL2*0.999 && Math.max(c3.o,c3.c)<=wH2*1.001) {
        var bk2=-1;
        for (var j2=i+3;j2<Math.min(i+12,candles.length);j2++) { if(candles[j2].c<wL2){bk2=j2;break;} }
        if (bk2!==-1) {
          var fh2=wH2,fl2=candles[bk2].c,rng2=fh2-fl2;
          if (rng2>=fl2*0.005) {
            var sl2=fh2,tp2=fl2-rng2*0.618,entry2=(sl2+tp2)/2;
            signals.push({type:'SHORT',entry:entry2,sl:sl2,tp:tp2,searchFrom:bk2+1});
            i=bk2;
          }
        }
      }
    }
  }
  return signals;
}

function sizePosition(capital, riskPct, maxLev, entry, sl) {
  var riskAmt=capital*riskPct, slDist=Math.abs(entry-sl);
  if (slDist<0.001) return null;
  var qty=riskAmt/slDist;
  var lev=Math.min(Math.max(Math.round(qty*entry/capital*10)/10,1),maxLev);
  return {qty:(capital*lev)/entry, leverage:lev};
}

function simulateTrades(candles, signals, capital, riskPct, maxLev, makerRate, takerRate) {
  var balance=capital, peakBal=capital, maxDD=0, trades=[];
  for (var s=0; s<signals.length; s++) {
    if (balance<=0) break;
    var sig=signals[s];
    var pos=sizePosition(balance,riskPct,maxLev,sig.entry,sig.sl);
    if (!pos) continue;
    var entryIdx=null, exitIdx=null, exitPrice=null, exitReason=null, holdBars=0;
    var lookEnd=Math.min(sig.searchFrom+60,candles.length);
    for (var i=sig.searchFrom;i<lookEnd;i++) {
      var c=candles[i];
      if (sig.type==='LONG'?c.l<=sig.entry:c.h>=sig.entry) { entryIdx=i; break; }
    }
    if (entryIdx===null) continue;
    for (var i2=entryIdx;i2<candles.length;i2++) {
      var c2=candles[i2]; holdBars++;
      if (sig.type==='LONG') {
        if(c2.l<=sig.sl){exitPrice=sig.sl;exitReason='SL';exitIdx=i2;break;}
        if(c2.h>=sig.tp){exitPrice=sig.tp;exitReason='TP';exitIdx=i2;break;}
      } else {
        if(c2.h>=sig.sl){exitPrice=sig.sl;exitReason='SL';exitIdx=i2;break;}
        if(c2.l<=sig.tp){exitPrice=sig.tp;exitReason='TP';exitIdx=i2;break;}
      }
      if(holdBars>200){exitPrice=c2.c;exitReason='EXP';exitIdx=i2;break;}
    }
    if (!exitIdx) continue;
    var priceDiff=sig.type==='LONG'?exitPrice-sig.entry:sig.entry-exitPrice;
    var rawPnl=priceDiff*pos.qty;
    var fee=sig.entry*pos.qty*makerRate/100+exitPrice*pos.qty*takerRate/100;
    var netPnl=rawPnl-fee;
    balance+=netPnl;
    if(balance>peakBal)peakBal=balance;
    var dd=(peakBal-balance)/peakBal*100;
    if(dd>maxDD)maxDD=dd;
    trades.push({
      n:trades.length+1,
      time:new Date(candles[entryIdx].t).toISOString().slice(0,16).replace('T',' '),
      type:sig.type, entry:sig.entry, exit:exitPrice, sl:sig.sl, tp:sig.tp,
      qty:pos.qty, leverage:pos.leverage, reason:exitReason,
      rawPnl:rawPnl, fee:fee, netPnl:netPnl, balance:balance, holdBars:holdBars
    });
  }
  return {trades:trades, maxDD:maxDD};
}

// ── FETCH ──────────────────────────────────────────────
async function fetchKlines(months) {
  var now=Date.now(), endTime=now-(now%86400000);
  var startTime=endTime-months*30*24*60*60*1000;
  var bases=['https://api.binance.com','https://api1.binance.com','https://api2.binance.com','https://api3.binance.com'];
  var base=null;
  for (var b=0;b<bases.length;b++) {
    setStatus('正在连接 Binance...');
    try {
      var r=await fetch(bases[b]+'/api/v3/ping');
      if(r.ok){base=bases[b];break;}
    } catch(e){}
  }
  if(!base) throw new Error('无法连接到 Binance。请检查网络连接后重试。');
  setStatus('✓ 已连接，正在下载K线数据...');
  var all=[], from=startTime;
  while(from<endTime){
    var url=base+'/api/v3/klines?symbol=ETHUSDT&interval=10m&startTime='+from+'&endTime='+endTime+'&limit=1000';
    var resp=await fetch(url);
    if(!resp.ok) throw new Error('数据获取失败 HTTP '+resp.status);
    var batch=await resp.json();
    if(!batch||!batch.length) break;
    for(var i=0;i<batch.length;i++) all.push(batch[i]);
    from=batch[batch.length-1][0]+1;
    setStatus('已获取 '+all.length+' 根真实K线...');
    if(batch.length<1000) break;
  }
  if(!all.length) throw new Error('获取到0根K线，请重试');
  return all.map(function(k){return{t:k[0],o:parseFloat(k[1]),h:parseFloat(k[2]),l:parseFloat(k[3]),c:parseFloat(k[4])};});
}

// ── CHARTS (pure canvas) ───────────────────────────────
function drawLineChart(canvasId, data, color) {
  var canvas=document.getElementById(canvasId);
  if(!canvas) return;
  var ctx=canvas.getContext('2d');
  var W=canvas.offsetWidth, H=parseInt(canvas.getAttribute('height'));
  canvas.width=W; canvas.height=H;
  if(!data||data.length<2) return;
  var vals=data.map(function(d){return d.v;});
  var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
  if(max===min){max+=1;min-=1;}
  var pad={t:10,r:60,b:20,l:10};
  var W2=W-pad.l-pad.r, H2=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='#1c2d48'; ctx.lineWidth=1;
  for(var g=0;g<=4;g++){
    var y=pad.t+H2*g/4;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    var v=(max-(max-min)*g/4).toFixed(1);
    ctx.fillStyle='#2d4560';ctx.font='9px Courier New';ctx.textAlign='left';
    ctx.fillText(v,W-pad.r+4,y+3);
  }
  // Line
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineJoin='round';
  for(var i=0;i<data.length;i++){
    var x=pad.l+W2*i/(data.length-1);
    var y2=pad.t+H2*(1-(data[i].v-min)/(max-min));
    if(i===0)ctx.moveTo(x,y2);else ctx.lineTo(x,y2);
  }
  ctx.stroke();
  // Fill
  ctx.lineTo(pad.l+W2,pad.t+H2);ctx.lineTo(pad.l,pad.t+H2);ctx.closePath();
  ctx.fillStyle=color.replace(')',',0.08)').replace('rgb','rgba');
  ctx.fill();
}

function drawBarChart(canvasId, data) {
  var canvas=document.getElementById(canvasId);
  if(!canvas) return;
  var ctx=canvas.getContext('2d');
  var W=canvas.offsetWidth, H=parseInt(canvas.getAttribute('height'));
  canvas.width=W; canvas.height=H;
  if(!data||!data.length) return;
  var vals=data.map(function(d){return d.v;});
  var max=Math.max.apply(null,vals.map(Math.abs));
  if(max===0) max=1;
  var pad={t:8,r:50,b:16,l:10};
  var W2=W-pad.l-pad.r, H2=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  var zero=pad.t+H2*0.5;
  ctx.strokeStyle='#1c2d48';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,zero);ctx.lineTo(W-pad.r,zero);ctx.stroke();
  var bw=Math.max(1,W2/data.length-1);
  for(var i=0;i<data.length;i++){
    var x=pad.l+W2*(i+0.5)/data.length;
    var pct=data[i].v/max*0.5;
    var yTop=zero-pct*H2, yH=Math.abs(pct*H2);
    if(yH<1)yH=1;
    ctx.fillStyle=data[i].v>=0?'rgba(0,230,118,0.8)':'rgba(255,61,87,0.8)';
    ctx.beginPath();
    if(data[i].v>=0){ctx.roundRect(x-bw/2,yTop,bw,yH,2);}
    else{ctx.roundRect(x-bw/2,zero,bw,yH,2);}
    ctx.fill();
  }
  ctx.fillStyle='#2d4560';ctx.font='9px Courier New';ctx.textAlign='left';
  ctx.fillText(max.toFixed(0),W-pad.r+4,pad.t+8);
  ctx.fillText('-'+max.toFixed(0),W-pad.r+4,pad.t+H2);
}

// ── RENDER ─────────────────────────────────────────────
function renderStats(trades, capital, maxDD) {
  var bar=document.getElementById('statsBar');
  if(!trades.length){bar.style.display='none';return;}
  var finalBal=trades[trades.length-1].balance;
  var totalPnl=finalBal-capital;
  var wins=trades.filter(function(t){return t.netPnl>0;});
  var losses=trades.filter(function(t){return t.netPnl<=0;});
  var winRate=(wins.length/trades.length*100).toFixed(1);
  var pnlPct=(totalPnl/capital*100).toFixed(2);
  var color=totalPnl>=0?'#00e676':'#ff3d57';
  var stats=[
    {l:'最终净值',v:finalBal.toFixed(2)+' U',c:color,s:'初始 '+capital+' USDT'},
    {l:'总盈亏',v:(totalPnl>=0?'+':'')+totalPnl.toFixed(2)+' U',c:color,s:pnlPct+'%'},
    {l:'胜率',v:winRate+'%',c:'#00e5ff',s:'盈'+wins.length+' / 亏'+losses.length},
    {l:'总交易',v:trades.length,c:'#00e5ff',s:'笔'},
    {l:'最大回撤',v:'-'+maxDD.toFixed(2)+'%',c:'#ff3d57',s:'历史最大'},
  ];
  bar.innerHTML=stats.map(function(s){
    return '<div class="stat-card"><div class="stat-label">'+s.l+'</div><div class="stat-val" style="color:'+s.c+'">'+s.v+'</div><div class="stat-sub">'+s.s+'</div></div>';
  }).join('');
  bar.style.display='flex';
}

function renderCharts(trades, capital) {
  var area=document.getElementById('chartsArea');
  if(!trades.length){area.style.display='none';return;}
  area.style.display='block';
  var eqData=[{v:capital}];
  trades.forEach(function(t){eqData.push({v:parseFloat(t.balance.toFixed(2))});});
  var pnlData=trades.map(function(t){return{v:parseFloat(t.netPnl.toFixed(2))};});
  setTimeout(function(){
    drawLineChart('equityChart',eqData,'rgb(0,229,255)');
    drawBarChart('pnlChart',pnlData);
  },50);
  var wins=trades.filter(function(t){return t.netPnl>0;});
  var losses=trades.filter(function(t){return t.netPnl<=0;});
  var avgWin=wins.length?wins.reduce(function(s,t){return s+t.netPnl;},0)/wins.length:0;
  var avgLoss=losses.length?losses.reduce(function(s,t){return s+t.netPnl;},0)/losses.length:0;
  var maxWin=Math.max.apply(null,trades.map(function(t){return t.netPnl;}));
  var maxLoss=Math.min.apply(null,trades.map(function(t){return t.netPnl;}));
  var totalFees=trades.reduce(function(s,t){return s+t.fee;},0);
  var avgHold=(trades.reduce(function(s,t){return s+t.holdBars;},0)/trades.length).toFixed(1);
  var avgLev=(trades.reduce(function(s,t){return s+t.leverage;},0)/trades.length).toFixed(1);
  var maxStreak=0,cur=0;
  trades.forEach(function(t){if(t.netPnl<=0){cur++;maxStreak=Math.max(maxStreak,cur);}else cur=0;});
  var mini=[
    {l:'平均盈利',v:'+'+avgWin.toFixed(2)+' U',c:'#00e676'},
    {l:'平均亏损',v:avgLoss.toFixed(2)+' U',c:'#ff3d57'},
    {l:'最大盈利',v:'+'+maxWin.toFixed(2)+' U',c:'#00e676'},
    {l:'最大亏损',v:maxLoss.toFixed(2)+' U',c:'#ff3d57'},
    {l:'平均持仓',v:avgHold+' 根',c:'#00e5ff'},
    {l:'平均杠杆',v:avgLev+'x',c:'#ffc400'},
    {l:'总手续费',v:'-'+totalFees.toFixed(2)+' U',c:'#ff3d57'},
    {l:'连续最大亏损',v:maxStreak+' 笔',c:'#ff3d57'},
  ];
  document.getElementById('miniStats').innerHTML=mini.map(function(m){
    return '<div class="mini-card"><div class="lbl">'+m.l+'</div><div class="val" style="color:'+m.c+'">'+m.v+'</div></div>';
  }).join('');
}

function renderTable(trades) {
  var wrap=document.getElementById('tableWrap');
  var empty=document.getElementById('emptyState');
  var cnt=document.getElementById('tradeCnt');
  if(!trades.length){wrap.style.display='none';empty.style.display='flex';empty.innerHTML='<div class="empty-icon">🔍</div><div class="mono" style="font-size:12px;">未发现交易信号</div>';cnt.style.display='none';return;}
  var filtered=trades.filter(function(t){
    if(currentFilter==='long') return t.type==='LONG';
    if(currentFilter==='short') return t.type==='SHORT';
    if(currentFilter==='win') return t.netPnl>0;
    if(currentFilter==='loss') return t.netPnl<=0;
    return true;
  });
  cnt.textContent=filtered.length+' 笔';cnt.style.display='inline';
  empty.style.display='none';wrap.style.display='block';
  var rows=filtered.map(function(t){
    var typeC=t.type==='LONG'?'#00e676':'#ff3d57';
    var pnlC=t.netPnl>=0?'#00e676':'#ff3d57';
    var rsnC=t.reason==='TP'?'#00e676':t.reason==='SL'?'#ff3d57':'#6a8ab0';
    var rsn=t.reason==='TP'?'✓ 止盈':t.reason==='SL'?'✗ 止损':'⏱ 超时';
    return '<tr><td style="color:#6a8ab0;">'+t.n+'</td><td style="color:#6a8ab0;">'+t.time+'</td>'
      +'<td style="color:'+typeC+';font-weight:700;">'+t.type+'</td>'
      +'<td style="color:#6a8ab0;">'+t.entry.toFixed(2)+'</td>'
      +'<td style="color:#6a8ab0;">'+t.exit.toFixed(2)+'</td>'
      +'<td style="color:#ff3d57;">'+t.sl.toFixed(2)+'</td>'
      +'<td style="color:#00e676;">'+t.tp.toFixed(2)+'</td>'
      +'<td style="color:#6a8ab0;">'+t.qty.toFixed(4)+'</td>'
      +'<td style="color:#ffc400;">'+t.leverage.toFixed(1)+'x</td>'
      +'<td style="color:'+rsnC+';">'+rsn+'</td>'
      +'<td style="color:'+pnlC+';font-weight:600;">'+(t.netPnl>=0?'+':'')+t.netPnl.toFixed(2)+'</td>'
      +'<td style="color:#2d4560;">-'+t.fee.toFixed(2)+'</td>'
      +'<td style="color:#ddeeff;">'+t.balance.toFixed(2)+'</td></tr>';
  }).join('');
  wrap.innerHTML='<table><thead><tr>'
    +'<th>#</th><th>时间</th><th>方向</th><th>入场价</th><th>出场价</th><th>止损价</th><th>止盈价</th>'
    +'<th>数量</th><th>杠杆</th><th>结果</th><th>盈亏</th><th>手续费</th><th>余额</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>';
}

function setFilter(f, btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderTable(allTrades);
}

function setStatus(msg) {
  document.getElementById('statusTxt').textContent=msg;
}

async function startBacktest() {
  var btn=document.getElementById('runBtn');
  btn.disabled=true; btn.textContent='⏳ 运行中...';
  document.getElementById('statsBar').style.display='none';
  document.getElementById('chartsArea').style.display='none';
  document.getElementById('tableWrap').style.display='none';
  document.getElementById('emptyState').style.display='flex';
  document.getElementById('emptyState').innerHTML='<div class="spinner"></div><div class="mono" style="font-size:11px;color:#6a8ab0;margin-top:8px;" id="loadTxt">正在连接...</div>';

  try {
    var months=parseInt(document.getElementById('cfg_period').value);
    var capital=parseFloat(document.getElementById('cfg_capital').value);
    var riskPct=parseFloat(document.getElementById('cfg_risk').value)/100;
    var maxLev=parseFloat(document.getElementById('cfg_maxlev').value);
    var makerRate=parseFloat(document.getElementById('cfg_fee_maker').value);
    var takerRate=parseFloat(document.getElementById('cfg_fee_taker').value);

    var candles=await fetchKlines(months);
    setStatus('扫描 '+candles.length+' 根K线中...');
    await sleep(50);
    var signals=detectSignals(candles);
    setStatus('发现 '+signals.length+' 个信号，模拟中...');
    await sleep(50);
    var result=simulateTrades(candles,signals,capital,riskPct,maxLev,makerRate,takerRate);
    allTrades=result.trades;
    setStatus('完成！共 '+allTrades.length+' 笔交易');
    renderStats(allTrades,capital,result.maxDD);
    renderCharts(allTrades,capital);
    renderTable(allTrades);
    document.getElementById('emptyState').style.display='none';
  } catch(e) {
    document.getElementById('emptyState').innerHTML='<div style="font-size:28px;">⚠️</div><div style="color:#ff3d57;font-size:12px;margin-top:8px;text-align:center;padding:0 20px;">'+((e&&e.message)||'未知错误')+'</div>';
    setStatus('');
  } finally {
    btn.disabled=false; btn.textContent='▶ 重新回测';
  }
}

function setLoadTxt(msg) {
  var el=document.getElementById('loadTxt');
  if(el) el.textContent=msg;
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
</script>
